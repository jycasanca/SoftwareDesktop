<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Financiera Gozu</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --warning: #ea580c;
            --danger: #dc2626;
            --light: #f3f4f6;
            --dark: #1f2937;
            --border: #e5e7eb;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--dark);
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 25px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        header {
            background: var(--primary);
            color: white;
            padding: 30px;
            text-align: center;
        }
        header h1 { font-size: 2em; margin-bottom: 5px; }
        header p { opacity: 0.9; }
        nav {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1px;
            background: var(--light);
            border-bottom: 2px solid var(--border);
        }
        nav a {
            text-decoration: none;
            padding: 15px;
            text-align: center;
            background: white;
            color: var(--primary);
            font-weight: 500;
            border-right: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        nav a:last-child { border-right: none; }
        nav a:hover { background: var(--primary); color: white; }
        nav a.active { background: var(--primary); color: white; }
        #content {
            padding: 30px;
        }
        h2 { margin-bottom: 20px; color: var(--dark); border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        table { 
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }
        th {
            background: var(--primary);
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }
        td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border);
        }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: var(--light); }
        .form-group {
            margin: 20px 0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        input, select, textarea {
            padding: 10px 15px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: inherit;
            font-size: 1em;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        textarea { resize: vertical; width: 100%; }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1em;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #1d4ed8; transform: translateY(-2px); box-shadow: 0 10px 15px rgba(37, 99, 235, 0.3); }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: #15803d; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-warning:hover { background: #c2410c; }
        .result-box {
            background: var(--light);
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
            margin: 20px 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            max-height: 400px;
            overflow-y: auto;
        }
        .alert {
            padding: 15px;
            border-radius: 6px;
            margin: 20px 0;
            border-left: 4px solid;
        }
        .alert-info { background: #dbeafe; border-color: var(--primary); color: #1e40af; }
        .alert-success { background: #dcfce7; border-color: var(--success); color: #166534; }
        .alert-error { background: #fee2e2; border-color: var(--danger); color: #991b1b; }
        @media (max-width: 768px) {
            .form-group { flex-direction: column; }
            input, select, textarea { width: 100%; }
            table { font-size: 0.9em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💼 Sistema Financiera Gozu</h1>
            <p>Procesamiento automático de asientos contables</p>
        </header>
        <nav>
            <a onclick="showView('diccionario')" href="#">📚 Diccionario</a>
            <a onclick="showView('reglas')" href="#">⚙️ Reglas</a>
            <a onclick="showView('procesar')" href="#">🔄 Procesar</a>
            <a onclick="showView('validacion')" href="#">✅ Validar</a>
            <a onclick="showView('reportes')" href="#">📊 Reportes</a>
        </nav>
        <div id="content"></div>
    </div>

    <script>
        let currentEntries = [];

        function showAlert(message, type = 'info') {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            const content = document.getElementById('content');
            content.insertBefore(alertDiv, content.firstChild);
            setTimeout(() => alertDiv.remove(), 4000);
        }

        function showView(view) {
            const content = document.getElementById('content');
            if (event && event.target) {
                document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
                event.target.classList.add('active');
            }

            if (view === 'diccionario') {
                content.innerHTML = `
                    <h2>📚 Editor de Diccionario</h2>
                    <p style="color: #666; margin-bottom: 20px;">Mapea palabras del usuario a conceptos contables estándar</p>
                    <table id="dicTable"><tr><th>Palabra Usuario</th><th>Concepto Estándar</th></tr></table>
                    <div class="form-group">
                        <input id="palabra" placeholder="Ej: yape, transferencia...">
                        <input id="concepto" placeholder="Ej: EFECTIVO, PAGO...">
                        <button class="btn-success" onclick="addSinonimo()">+ Agregar</button>
                    </div>
                `;
                loadDiccionario();
            } else if (view === 'reglas') {
                content.innerHTML = `
                    <h2>⚙️ Editor de Reglas de Comportamiento</h2>
                    <p style="color: #666; margin-bottom: 20px;">Define cómo se contabilizan conceptos (cuenta DEBE, cuenta HABER, prioridad)</p>
                    <table id="reglasTable"><tr><th>Concepto</th><th>Cuenta DEBE</th><th>Cuenta HABER</th><th>Prioridad</th></tr></table>
                    <div class="form-group">
                        <input id="concReg" placeholder="Concepto">
                        <input id="cuentaDebReg" placeholder="Cuenta DEBE">
                        <input id="cuentaHabReg" placeholder="Cuenta HABER">
                        <input id="priReg" type="number" placeholder="Prioridad (1-10)" min="1" max="10">
                        <button class="btn-success" onclick="addRegla()">+ Agregar</button>
                    </div>
                `;
                loadReglas();
            } else if (view === 'procesar') {
                content.innerHTML = `
                    <h2>🔄 Procesar Transacción</h2>
                    <p style="color: #666; margin-bottom: 20px;">Convierte texto o audio en asientos contables automáticos</p>
                    <div class="form-group">
                        <textarea id="texto" placeholder="Ej: Recibí 1000 en yape por venta a cliente..."></textarea>
                    </div>
                    <div class="form-group">
                        <input type="file" id="audioFile" accept="audio/*">
                        <input id="monto" type="number" placeholder="Monto" min="0" step="0.01">
                        <button class="btn-primary" onclick="processText()">Procesar Texto</button>
                        <button class="btn-primary" onclick="processAudio()">Procesar Audio</button>
                    </div>
                    <div id="result"></div>
                `;
            } else if (view === 'validacion') {
                content.innerHTML = `
                    <h2>✅ Validar y Guardar Asiento</h2>
                    <p style="color: #666; margin-bottom: 20px;">Revisa los asientos generados antes de guardar en el libro diario</p>
                    <table id="valTable"><tr><th>Cuenta DEBE</th><th>Cuenta HABER</th><th>Monto</th></tr></table>
                    <div style="margin-top: 20px;">
                        <button class="btn-success" onclick="saveAsiento()">💾 Guardar Asiento</button>
                    </div>
                `;
                renderValidationTable();
            } else if (view === 'reportes') {
                content.innerHTML = `
                    <h2>📊 Reportes Financieros</h2>
                    <p style="color: #666; margin-bottom: 20px;">Consulta balances y estados financieros</p>
                    <div class="form-group">
                        <button class="btn-primary" onclick="getBalance()">Balance de Comprobación</button>
                        <button class="btn-primary" onclick="generatePDF()">Descargar PDF</button>
                    </div>
                    <div id="report"></div>
                `;
            }
        }

        async function loadDiccionario() {
            try {
                const res = await fetch('/diccionario');
                const data = await res.json();
                const table = document.getElementById('dicTable');
                table.innerHTML = '<tr><th>Palabra Usuario</th><th>Concepto Estándar</th></tr>';
                data.diccionario.forEach(row => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td>${row[1]}</td><td>${row[2]}</td>`;
                    table.appendChild(tr);
                });
            } catch (e) {
                showAlert('Error al cargar diccionario: ' + e.message, 'error');
            }
        }

        async function addSinonimo() {
            const palabra = document.getElementById('palabra').value.trim();
            const concepto = document.getElementById('concepto').value.trim().toUpperCase();
            if (!palabra || !concepto) {
                showAlert('Complete palabra y concepto', 'error');
                return;
            }
            try {
                const data = new URLSearchParams();
                data.append('palabra', palabra);
                data.append('concepto', concepto);
                await fetch('/add_sinonimo', { method: 'POST', body: data });
                showAlert(`Se agregó: "${palabra}" → "${concepto}"`, 'success');
                showView('diccionario');
            } catch (e) {
                showAlert('Error al agregar sinónimo', 'error');
            }
        }

        async function loadReglas() {
            try {
                const res = await fetch('/matriz_comportamiento');
                const data = await res.json();
                const table = document.getElementById('reglasTable');
                table.innerHTML = '<tr><th>Concepto</th><th>Cuenta DEBE</th><th>Cuenta HABER</th><th>Prioridad</th></tr>';
                data.matriz.forEach(row => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td>${row[1]}</td><td>${row[2]}</td><td>${row[3]}</td><td>${row[4]}</td>`;
                    table.appendChild(tr);
                });
            } catch (e) {
                showAlert('Error al cargar reglas: ' + e.message, 'error');
            }
        }

        async function addRegla() {
            const concepto = document.getElementById('concReg').value.trim().toUpperCase();
            const cuentaDeb = document.getElementById('cuentaDebReg').value.trim();
            const cuentaHab = document.getElementById('cuentaHabReg').value.trim();
            const prioridad = parseInt(document.getElementById('priReg').value, 10);
            if (!concepto || !cuentaDeb || !cuentaHab || Number.isNaN(prioridad)) {
                showAlert('Complete todos los campos de forma correcta', 'error');
                return;
            }
            try {
                const data = new URLSearchParams();
                data.append('concepto', concepto);
                data.append('cuenta_debe', cuentaDeb);
                data.append('cuenta_haber', cuentaHab);
                data.append('prioridad', prioridad);
                const res = await fetch('/add_regla_v2', { method: 'POST', body: data });
                if (res.ok) {
                    showAlert(`Regla agregada: ${concepto}`, 'success');
                    showView('reglas');
                } else {
                    showAlert('Error al agregar regla', 'error');
                }
            } catch (e) {
                showAlert('Error al agregar regla: ' + e.message, 'error');
            }
        }

        async function processText() {
            const texto = document.getElementById('texto').value.trim();
            const monto = parseFloat(document.getElementById('monto').value);
            if (!texto || Number.isNaN(monto) || monto <= 0) {
                showAlert('Proporcione texto y monto válidos (mayor a 0)', 'error');
                return;
            }
            try {
                const body = new URLSearchParams();
                body.append('text', texto);
                body.append('amount', monto);
                const res = await fetch('/process_text', { method: 'POST', body });
                const data = await res.json();
                currentEntries = data.entries || [];
                renderResult(data);
                showAlert('Procesado correctamente', 'success');
                setTimeout(() => showView('validacion'), 1000);
            } catch (e) {
                showAlert('Error al procesar texto: ' + e.message, 'error');
            }
        }

        async function processAudio() {
            const fileInput = document.getElementById('audioFile');
            const monto = parseFloat(document.getElementById('monto').value);
            if (!fileInput.files.length || Number.isNaN(monto) || monto <= 0) {
                showAlert('Suba un archivo de audio y proporcione el monto', 'error');
                return;
            }
            try {
                const formData = new FormData();
                formData.append('file', fileInput.files[0]);
                formData.append('amount', monto);
                const res = await fetch('/process_audio', { method: 'POST', body: formData });
                if (!res.ok) throw new Error('Whisper no disponible. Use texto en su lugar.');
                const data = await res.json();
                currentEntries = data.entries || [];
                renderResult(data);
                showAlert('Audio procesado correctamente', 'success');
                setTimeout(() => showView('validacion'), 1000);
            } catch (e) {
                showAlert('Error al procesar audio: ' + e.message, 'error');
            }
        }

        function renderResult(data) {
            const result = document.getElementById('result');
            if (!result) return;
            result.innerHTML = `<div class="result-box">${JSON.stringify(data, null, 2)}</div>`;
        }

        function renderValidationTable() {
            const table = document.getElementById('valTable');
            if (!table) return;
            table.innerHTML = '<tr><th>Cuenta DEBE</th><th>Cuenta HABER</th><th>Monto</th></tr>';
            if (currentEntries.length === 0) {
                table.innerHTML += '<tr><td colspan="3" style="text-align: center; padding: 30px; color: #999;">Procesa una transacción para ver los asientos generados</td></tr>';
                return;
            }
            currentEntries.forEach((entry, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><input data-index="${index}" data-field="cuenta_debe" value="${entry.cuenta_debe || ''}" style="width: 100%;"></td>
                    <td><input data-index="${index}" data-field="cuenta_haber" value="${entry.cuenta_haber || ''}" style="width: 100%;"></td>
                    <td><input type="number" data-index="${index}" data-field="monto" value="${entry.monto || ''}" style="width: 100%;"></td>
                `;
                table.appendChild(tr);
            });
            const inputs = table.querySelectorAll('input');
            inputs.forEach(input => input.addEventListener('change', updateEntryFromInput));
        }

        function updateEntryFromInput(event) {
            const target = event.target;
            const index = parseInt(target.dataset.index, 10);
            const field = target.dataset.field;
            if (Number.isNaN(index) || !field) return;
            if (field === 'monto') {
                currentEntries[index][field] = parseFloat(target.value) || 0;
            } else {
                currentEntries[index][field] = target.value;
            }
        }

        async function saveAsiento() {
            if (!currentEntries.length) {
                showAlert('No hay asientos para guardar. Procesa una transacción primero.', 'error');
                return;
            }
            const descripcion = prompt('Descripción del asiento:', 'Registro generado por el sistema');
            if (!descripcion) return;
            try {
                const res = await fetch('/save_asiento', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ entries: currentEntries, descripcion })
                });
                const data = await res.json();
                showAlert('✅ Asiento guardado correctamente', 'success');
                currentEntries = [];
                renderValidationTable();
            } catch (e) {
                showAlert('Error al guardar asiento: ' + e.message, 'error');
            }
        }

        async function getBalance() {
            try {
                const res = await fetch('/balance_comprobacion');
                const data = await res.json();
                const report = document.getElementById('report');
                report.innerHTML = `<div class="result-box">Balance de Comprobación:\n\n${JSON.stringify(data.balance, null, 2)}</div>`;
            } catch (e) {
                showAlert('Error al obtener balance: ' + e.message, 'error');
            }
        }

        async function generatePDF() {
            try {
                const res = await fetch('/generate_pdf');
                if (res.ok) {
                    const blob = await res.blob();
                    const url = URL.createObjectURL(blob);
                    const report = document.getElementById('report');
                    report.innerHTML = `<div class="alert alert-success"><a href="${url}" target="_blank" style="color: inherit; font-weight: bold;">📥 Descargar Estados Financieros PDF</a></div>`;
                } else {
                    showAlert('No se pudo generar el PDF', 'error');
                }
            } catch (e) {
                showAlert('Error al generar PDF: ' + e.message, 'error');
            }
        }

        showView('diccionario');
    </script>
</body>
</html>
